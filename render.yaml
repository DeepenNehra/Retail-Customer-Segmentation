services:
  # Backend API
  - type: web
    name: segmentation-knight-backend
    runtime: python
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "cd backend && gunicorn backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: segmentation-knight-db
          property: connectionString
    healthCheckPath: /api/

  # Frontend
  - type: web
    name: segmentation-knight-frontend
    runtime: node
    buildCommand: "cd frontend && npm install && npm run build && npm install -g serve"
    startCommand: "cd frontend && serve -s dist -p $PORT"
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_API_URL
        sync: false

# Database
databases:
  - name: segmentation-knight-db
    databaseName: segmentation_knight
    user: segmentation_knight_user
